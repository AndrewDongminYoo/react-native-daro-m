buildscript {
    // Daro Dashboard app ID
    ext.daroAppKey = "<your-daro-dashboard-uuid>"
    ext {
        buildToolsVersion = "36.0.0"
        minSdkVersion = 24
        compileSdkVersion = 36
        targetSdkVersion = 36
        ndkVersion = "27.1.12297006"
        kotlinVersion = "2.1.20"
    }
    repositories {
        google()
        mavenCentral()
        // DaroM Gradle plugin (so.daro:daro-plugin) is hosted on the Kakao
        // Nexus repo. Runtime mediation network repos live in the
        // allprojects { repositories { ... } } block below — buildscript only
        // needs the plugin coordinates.
        maven { url "https://devrepo.kakao.com/nexus/content/groups/public/" }
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
        // DaroM Gradle plugin — host-app integration responsibility per the
        // DaroM SDK's distribution model. See example/README.md → Android.
        classpath("so.daro:daro-plugin:1.0.12")
    }
}

// DaroM SDK pulls AppLovin MAX adapters that each require their own
// network-specific Maven repo. AppLovin's own repo (artifacts.applovin.com)
// returns HTTP 403 for non-AppLovin artifacts, so it MUST come last —
// otherwise Gradle hits the 403 before trying the real network repo.
// Order matches host-rn-app/android/settings.gradle (which moves the
// AppLovin repo to the end with a comment explicitly noting the reason).
allprojects {
    repositories {
        google()
        mavenCentral()
        maven { url "https://devrepo.kakao.com/nexus/content/groups/public/" }   // DaroM SDK
        maven { url "https://android-sdk.is.com" }                                // IronSource
        maven { url "https://artifact.bytedance.com/repository/pangle" }          // Pangle (ByteDance)
        maven { url "https://dl-maven-android.mintegral.com/repository/mbridge_android_sdk_oversea" }  // Mintegral
        maven { url "https://maven.ogury.co" }                                    // Ogury
        maven { url "https://s3.amazonaws.com/smaato-sdk-releases/" }             // Smaato
        maven { url "https://verve.jfrog.io/artifactory/verve-gradle-release" }   // Verve / HyBid
        maven { url "https://cboost.jfrog.io/artifactory/chartboost-ads" }        // Chartboost ads
        maven { url "https://cboost.jfrog.io/artifactory/chartboost-mediation" }  // Chartboost mediation
        maven { url = uri("https://artifacts.applovin.com/android") }             // AppLovin — MUST stay last
    }
}

apply plugin: "com.facebook.react.rootproject"
